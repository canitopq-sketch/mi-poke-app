<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Mi Primera PokeApp</title>
    <style>
      body { 
        font-family: sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        background: #f0f0f0; 
        transition: 0.5s; 
        margin: 0;
        padding: 20px;
      }
      .card { 
        background: white; 
        padding: 20px; 
        border-radius: 15px; 
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); 
        text-align: center; 
        width: 320px; 
        margin-top: 20px; 
        transition: 0.5s; 
        min-height: 480px;
      }
      img { width: 200px; height: 200px; transition: opacity 0.5s ease-in-out; }
      h1 { text-transform: capitalize; color: #333; margin: 10px 0; }
      button { 
        padding: 12px 20px; 
        cursor: pointer; 
        background: #333; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        margin-top: 10px; 
        font-size: 1rem;
      }
      input { 
        padding: 12px; 
        border-radius: 8px; 
        border: 1px solid #ccc; 
        margin-bottom: 15px; 
        width: 80%; 
        font-size: 1rem;
      }
      .evo-box { font-style: italic; color: #444; margin-top: 15px; font-weight: bold; }
      #poke-evo a { cursor: pointer; color: #000; }

      /* --- MEDIA QUERY PARA MÓVILES --- */
      @media (max-width: 480px) {
        .card {
          width: 95%; /* Ocupa casi todo el ancho */
          box-sizing: border-box;
          margin-top: 10px;
        }
        img {
          width: 160px; /* Un poco más pequeño para evitar scroll */
          height: 160px;
        }
        button, input {
          width: 100%; /* Botones gigantes para el pulgar */
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <input type="text" id="poke-input" placeholder="Nombre o ID..." />
      <h1 id="poke-name">Cargando...</h1>
      <img id="poke-img" src="" alt="Imagen del Pokémon" />
      <p>ID: <span id="poke-id"></span></p>
      <p>Tipo: <span id="poke-types"></span></p>
      <div class="evo-box">Evolución: <span id="poke-evo">Buscando...</span></div>
      <button onclick="traerPokemon()">¡Buscar Pokémon!</button>
    </div>

    <script>
      async function traerPokemon() {
        const inputElement = document.getElementById("poke-input");
        const input = inputElement.value.toLowerCase();
        const query = input || Math.floor(Math.random() * 151) + 1;

        try {
          const respuesta = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
          if (!respuesta.ok) return alert("Pokémon no encontrado");
          const datos = await respuesta.json();

          document.getElementById("poke-name").innerText = datos.name;
          document.getElementById("poke-id").innerText = datos.id;
          document.getElementById("poke-img").src = datos.sprites.other["official-artwork"].front_default;
          document.getElementById("poke-types").innerText = datos.types.map(t => t.type.name).join(", ");

          // Lógica de Evoluciones (Triple Fetch)
          const resEspecie = await fetch(datos.species.url);
          const datosEspecie = await resEspecie.json();
          const resEvo = await fetch(datosEspecie.evolution_chain.url);
          const datosEvo = await resEvo.json();

          let nombreEvo = "Máxima evolución";
          if (datosEvo.chain.species.name === datos.name) {
            nombreEvo = datosEvo.chain.evolves_to[0]?.species.name || "No tiene";
          } else if (datosEvo.chain.evolves_to[0]?.species.name === datos.name) {
            nombreEvo = datosEvo.chain.evolves_to[0].evolves_to[0]?.species.name || "Máxima evolución";
          }

          const evoElement = document.getElementById("poke-evo");
          if (nombreEvo !== "Máxima evolución" && nombreEvo !== "No tiene") {
            evoElement.innerHTML = `<a href="#" onclick="buscarEvolucion('${nombreEvo}')" style="text-decoration: underline;">${nombreEvo}</a>`;
          } else {
            evoElement.innerText = nombreEvo;
          }

          // Estética y Audio
          const colores = { grass: "#78c850", fire: "#f08030", water: "#6890f0", bug: "#a8b820", normal: "#a8a878", poison: "#a040a0", electric: "#f8d030", ground: "#e0c068", psychic: "#f85888", rock: "#b8a038", fairy: "#ee99ac", fighting: "#c03028", ice: "#98d8d8", ghost: "#705898", dragon: "#7038f8" };
          document.querySelector(".card").style.backgroundColor = colores[datos.types[0].type.name] || "#ffffff";
          
          new Audio(datos.cries.latest).play();
          inputElement.value = "";

        } catch (error) {
          console.error("Error:", error);
        }
      }

      function buscarEvolucion(nombre) {
        document.getElementById("poke-input").value = nombre;
        traerPokemon();
      }

      document.getElementById("poke-input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") traerPokemon();
      });

      traerPokemon();
    </script>
  </body>
</html>
